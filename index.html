<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人體器官互動圖</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <header>
      <h1>人體器官互動圖</h1>
      <p>點選人體圖上的器官，查看簡單介紹，並完成小測驗。</p>
    </header>

            <defs>
              <style>
                .body { fill: #f9e2d2; stroke: #a66; stroke-width: 2; }
                .organ { fill: #f6c9c2; stroke: #923; stroke-width: 1.5; cursor: pointer; }
                .organ:hover { fill: #ffcbc3; }
                .label { font: 10px sans-serif; fill: #333; }
              </style>
            </defs>
            <path class="body" d="M130 24
              c-20 0 -36 16 -36 36
              s16 36 36 36
              s36-16 36-36
              s-16-36 -36-36
            z
            M92 90
              c-20 24 -24 64 -24 96
              c0 22 14 30 24 30
              h6

              c0 16 10 26 24 26

              c0-32 -4-72 -24-96
              c-10-14 -22-22 -38-22
              c-14 0 -26 8 -36 22
              c-10-14 -22-22 -36-22
              c-16 0 -28 8 -38 22
            z
            M98 238
              c-6 32 -10 66 -10 92
              c0 12 8 18 18 18
              h10
              v46
              h20
              v-46
              h10
              c10 0 18-6 18-18
              c0-26 -4-60 -10-92
              c-4 -16 -8 -28 -18-28
              c-10 0 -14 12 -18 28
            z" />
            <path class="organ" data-organ="brain" d="M130 42
              c-18 0 -34 12 -34 30
              c0 8 -4 12 -10 12
              c-8 0 -14 8 -14 16
              c0 8 6 16 14 16
              c4 0 8-2 10-6
              c8 0 10 6 22 6
              c12 0 14-6 22-6
              c2 4 6 6 10 6
              c8 0 14-8 14-16
              c0-8 -6-16 -14-16
              c-6 0 -10-4 -10-12
              c0-18 16-30 34-30
              c18 0 34 12 34 30
              c0 8 -4 12 -10 12
              c-8 0 -14 8 -14 16
              c0 8 6 16 14 16
              c6 0 10-4 10-12
              c0-18 -16-30 -34-30
              z" />
            <g data-organ="lungs" class="organ">
              <path d="M90 118
                c-10 -10 -20 0 -22 14
                c-2 12 0 20 6 28
                c6 8 12 12 16 18
                c4 6 6 12 6 18
                v18
                c0 6 4 10 10 10
                h12

                v-18
                c0 -8 4-14 10-18
                c10 -8 18 -18 18 -34

                c10 -10 20 0 22 14
                c2 12 0 20 -6 28
                c-6 8 -12 12 -16 18

                v18

            </g>
            <path class="organ" data-organ="heart" d="M130 204
              c-18 -18 -34 -14 -42 -6

            <text x="130" y="55" text-anchor="middle" class="label">腦</text>
            <text x="130" y="135" text-anchor="middle" class="label">肺</text>
            <text x="130" y="205" text-anchor="middle" class="label">心</text>
            <text x="130" y="280" text-anchor="middle" class="label">肝</text>
            <text x="130" y="355" text-anchor="middle" class="label">胃</text>
            <text x="130" y="430" text-anchor="middle" class="label">腎</text>
          </svg>
        </div>
      </div>

      <aside class="info-card">
        <h2>器官介紹</h2>
        <div id="organIntro" class="intro-box">
          <p>請點選左側人體圖上的器官名稱，查看器官功能與介紹。</p>
        </div>
      </aside>
    </section>

    <section class="quiz-card">
      <h2>小測驗</h2>
      <div id="quizArea" class="quiz-area">
        <p id="questionText">準備好了，開始測驗吧！</p>
        <div id="choices" class="choices"></div>
        <button id="nextBtn" class="button" type="button">下一題</button>
      </div>
      <div id="result" class="result hidden"></div>
    </section>

    <section class="knowledge-card">
      <h2>小知識</h2>
      <div id="knowledgeArea" class="intro-box">
        <p>每次點擊「下一個小知識」都會看到一條新的人體器官趣味資訊。</p>
      </div>
      <button id="factBtn" class="button" type="button">下一個小知識</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
