<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人體器官互動圖</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <header>
      <h1>人體器官互動圖</h1>
      <p>點選人體圖上的器官，查看簡單介紹，並完成小測驗。</p>
    </header>

    <section class="content">
      <div class="diagram-card">
        <h2>點選器官</h2>
        <div class="diagram-wrapper">
          <svg viewBox="0 0 260 520" class="body-svg" aria-label="人體器官示意圖">
            <defs>
              <style>
                .body { fill: #f9e2d2; stroke: #a66; stroke-width: 2; }
                .organ { fill: #f6c9c2; stroke: #923; stroke-width: 1.5; cursor: pointer; }
                .organ:hover { fill: #ffcbc3; }
                .label { font: 10px sans-serif; fill: #333; }
              </style>
            </defs>
            <path class="body" d="M130 24
              c-20 0 -36 16 -36 36
              s16 36 36 36
              s36-16 36-36
              s-16-36 -36-36
            z
            M92 90
              c-20 24 -24 64 -24 96
              c0 22 14 30 24 30
              h6
              c0 0 0 30 0 60
              c0 16 10 26 24 26
              h76
              c14 0 24-10 24-26
              v-60
              h6
              c10 0 24-8 24-30
              c0-32 -4-72 -24-96
              c-10-14 -22-22 -38-22
              c-14 0 -26 8 -36 22
              c-10-14 -22-22 -36-22
              c-16 0 -28 8 -38 22
            z
            M98 238
              c-6 32 -10 66 -10 92
              c0 12 8 18 18 18
              h10
              v46
              h20
              v-46
              h10
              c10 0 18-6 18-18
              c0-26 -4-60 -10-92
              c-4 -16 -8 -28 -18-28
              c-10 0 -14 12 -18 28
            z" />
            <path class="organ" data-organ="brain" d="M130 38c-24 0-34 16-34 25c0 6 3 12 8 16c-8 0-14 7-14 15c0 8 6 15 14 15c-5 4-8 10-8 16c0 9 10 25 34 25c24 0 34-16 34-25c0-6-3-12-8-16c8 0 14-7 14-15c0-8-6-15-14-15c5-4 8-10 8-16c0-9-10-25-34-25z" />
            <g data-organ="lungs" class="organ">
              <path d="M90 115c-10 5-18 18-18 32c0 18 12 32 28 36c0 10 0 22 0 26c0 4 3 7 7 7h14c4 0 7-3 7-7v-24c0-5 3-8 7-8h12c4 0 7 3 7 8v24c0 4 3 7 7 7h14c4 0 7-3 7-7v-26c16-4 28-18 28-36c0-14-8-27-18-32c0-14-12-24-26-24c-7 0-14 3-19 8c-5-5-12-8-19-8c-14 0-26 10-26 24z" />
              <path d="M135 115c0-4 3-7 7-7h18c4 0 7 3 7 7v14c0 5-4 9-9 9h-5c-5 0-9-4-9-9v-14z" fill="none" />
            </g>
            <path class="organ" data-organ="heart" d="M130 205c-18-24-34-20-42-12c-10 10-10 24 0 36c12 14 22 22 22 22s10-8 22-22c10-12 10-26 0-36c-8-8-24-12-42 12z" />
            <path class="organ" data-organ="liver" d="M85 255c0 0 16-18 45-16c18 1 28 8 48 10c15 1 28-5 37-15c6-7 12-10 17-10c0 15-8 31-22 38c-14 7-29 12-45 12c-24 0-35-4-50 2c-12 5-21 18-23 32c-1 10-2 20-2 30c-18 0-30-14-30-32c0-13 7-25 16-32z" />
            <path class="organ" data-organ="stomach" d="M100 338c0-18 14-34 30-34c12 0 22 7 28 18c6 12 10 26 10 40c0 16-15 26-28 26c-21 0-30-15-30-50z" />
            <g data-organ="kidneys" class="organ">
              <path d="M88 398c-12 0-22 14-22 28c0 11 9 20 20 20c8 0 16-5 19-13c2-6 1-14-3-19c-5-8-8-16-14-16z" />
              <path d="M172 398c12 0 22 14 22 28c0 11-9 20-20 20c-8 0-16-5-19-13c-2-6-1-14 3-19c5-8 8-16 14-16z" />
            </g>
            <text x="130" y="55" text-anchor="middle" class="label">腦</text>
            <text x="130" y="135" text-anchor="middle" class="label">肺</text>
            <text x="130" y="205" text-anchor="middle" class="label">心</text>
            <text x="130" y="280" text-anchor="middle" class="label">肝</text>
            <text x="130" y="355" text-anchor="middle" class="label">胃</text>
            <text x="130" y="430" text-anchor="middle" class="label">腎</text>
          </svg>
        </div>
      </div>

      <aside class="info-card">
        <h2>器官介紹</h2>
        <div id="organIntro" class="intro-box">
          <p>請點選左側人體圖上的器官名稱，查看器官功能與介紹。</p>
        </div>
      </aside>
    </section>

    <section class="quiz-card">
      <h2>小測驗</h2>
      <div id="quizArea" class="quiz-area">
        <p id="questionText">準備好了，開始測驗吧！</p>
        <div id="choices" class="choices"></div>
        <button id="nextBtn" class="button" type="button">下一題</button>
      </div>
      <div id="result" class="result hidden"></div>
    </section>

    <section class="knowledge-card">
      <h2>小知識</h2>
      <div id="knowledgeArea" class="intro-box">
        <p>每次點擊「下一個小知識」都會看到一條新的人體器官趣味資訊。</p>
      </div>
      <button id="factBtn" class="button" type="button">下一個小知識</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
