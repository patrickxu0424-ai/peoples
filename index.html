<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人體器官互動圖</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <header>
      <h1>人體器官互動圖</h1>
      <p>點選人體圖上的器官，查看簡單介紹，並完成小測驗。</p>
    </header>

    <section class="content">
      <div class="diagram-card">
        <h2>點選器官</h2>
        <div class="diagram-wrapper">
          <svg viewBox="0 0 260 520" class="body-svg" aria-label="人體器官示意圖">
            <defs>
              <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#f8d3ff" />
                <stop offset="40%" stop-color="#f3a1f5" />
                <stop offset="100%" stop-color="#b66cc6" />
              </linearGradient>
              <style>
                .body { fill: none; stroke: #2c1637; stroke-width: 10; stroke-linecap: round; stroke-linejoin: round; }
                .organ { fill: #f8d3ff; stroke: #b56aa8; stroke-width: 1.5; cursor: pointer; transition: fill 0.2s ease, stroke 0.2s ease; }
                .brain-organ { fill: url(#brainGradient); stroke: #913a83; stroke-width: 2; filter: drop-shadow(0 0 8px rgba(183, 94, 167, 0.45)); }
                .organ:hover { fill: #fcd5f6; stroke: #a55195; }
                .label { font: 10px sans-serif; fill: #3a1b38; }
              </style>
            </defs>
            <circle class="body" cx="130" cy="80" r="60" />
            <path class="body" d="M68 182 C58 172, 52 150, 58 124 C72 96, 104 92, 132 122" />
            <path class="body" d="M192 182 C202 172, 208 150, 202 124 C188 96, 156 92, 128 122" />
            <path class="body" d="M130 122 L130 224" />
            <path class="body" d="M94 224 C92 258, 84 298, 84 348 L84 473" />
            <path class="body" d="M166 224 C168 258, 176 298, 176 348 L176 473" />
            <g class="organ brain-organ" data-organ="brain">
              <!-- 大腦外層輪廓 -->
              <path d="M90 55 C70 60, 70 95, 90 105 C95 110, 120 110, 125 105 C130 100, 135 110, 150 110 C170 110, 185 100, 185 80 C185 65, 175 50, 155 48 C150 45, 140 40, 130 42 C120 44, 110 50, 100 48 C95 47, 92 53, 90 55 Z"
                    fill="none" stroke="inherit" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
              <!-- 內部腦迴紋理 -->
              <path d="M95 68 C105 72, 110 86, 120 82 C128 78, 130 94, 140 92" fill="none" stroke="inherit" stroke-width="2" stroke-linecap="round"/>
              <path d="M108 92 C118 96, 122 104, 132 100" fill="none" stroke="inherit" stroke-width="2" stroke-linecap="round"/>
              <path d="M100 80 C90 92, 98 98, 110 96" fill="none" stroke="inherit" stroke-width="2" stroke-linecap="round"/>
            </g>
            <g data-organ="lungs" class="organ">
              <path d="M90 118
                C70 110 64 142 74 168
                C82 190 96 204 112 208
                C116 214 126 218 132 208
                C144 190 148 156 136 132
                C130 122 118 118 106 118
                C98 118 94 117 90 118
                Z" />
              <path d="M170 118
                C190 110 196 142 186 168
                C178 190 164 204 148 208
                C144 214 134 218 128 208
                C116 190 112 156 124 132
                C130 122 142 118 154 118
                C162 118 166 117 170 118
                Z" />
              <path d="M130 150
                v24
                C130 176 128 182 122 188
                C118 192 116 198 118 204
                C120 210 124 214 130 214
                C136 214 140 210 142 204
                C144 198 142 192 138 188
                C132 182 130 176 130 150
                Z" />
            </g>
            <path class="organ" data-organ="heart" d="M130 174
              C108 145 70 150 70 184
              C70 219 105 244 130 269
              C155 244 190 219 190 184
              C190 150 152 145 130 178
              Z" />
            <path class="organ" data-organ="liver" d="M90 292
              C80 286 74 268 78 252
              C82 236 92 222 108 218
              C124 214 146 216 164 224
              C176 230 188 236 190 246
              C192 254 186 266 174 272
              C164 278 148 282 132 284
              C114 286 102 282 94 274
              C90 272 92 274 90 292
              Z" />
            <path class="organ" data-organ="stomach" d="M114 342
              C108 302 120 268 144 262
              C168 256 194 270 198 292
              C202 310 192 326 178 336
              C166 344 148 348 134 346
              C122 344 114 338 110 328
              C108 320 110 312 116 306
              C122 300 130 296 138 294
              C148 292 156 292 162 298
              C168 304 172 312 170 322
              C166 332 158 338 148 342
              C140 346 132 346 126 342
              C120 338 116 334 114 342
              Z" />
            <g data-organ="kidneys" class="organ">
              <path d="M80 338
                c-18 -10 -30 8 -30 24
                c0 18 12 30 28 30
                c8 0 16 -4 20 -10
                c6 -10 6 -22 2 -32
                c-4 -8 -8 -14 -12 -18
                z" />
              <path d="M172 338
                c18 -10 30 8 30 24
                c0 18 -12 30 -28 30
                c-8 0 -16 -4 -20 -10
                c-6 -10 -6 -22 -2 -32
                c4 -8 8 -14 12 -18
                z" />
            </g>
            <text x="130" y="55" text-anchor="middle" class="label">腦</text>
            <text x="130" y="135" text-anchor="middle" class="label">肺</text>
            <text x="130" y="205" text-anchor="middle" class="label">心</text>
            <text x="130" y="260" text-anchor="middle" class="label">肝</text>
            <text x="130" y="335" text-anchor="middle" class="label">胃</text>
            <text x="130" y="390" text-anchor="middle" class="label">腎</text>
          </svg>
        </div>
      </div>

      <aside class="info-card">
        <h2>器官介紹</h2>
        <div id="organIntro" class="intro-box">
          <p>請點選左側人體圖上的器官名稱，查看器官功能與介紹。</p>
        </div>
      </aside>
    </section>

    <section class="quiz-card">
      <h2>小測驗</h2>
      <div id="quizArea" class="quiz-area">
        <p id="questionText">準備好了，開始測驗吧！</p>
        <div id="choices" class="choices"></div>
        <button id="nextBtn" class="button" type="button">下一題</button>
      </div>
      <div id="result" class="result hidden"></div>
    </section>

    <section class="knowledge-card">
      <h2>小知識</h2>
      <div id="knowledgeArea" class="intro-box">
        <p>每次點擊「下一個小知識」都會看到一條新的人體器官趣味資訊。</p>
      </div>
      <button id="factBtn" class="button" type="button">下一個小知識</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
